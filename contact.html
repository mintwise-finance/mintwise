<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — MintWise</title>
    <meta name="description" content="Get in touch with MintWise.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar"><div class="container nav-container">
        <a href="index.html" class="logo"><span class="logo-icon">💰</span><span class="logo-text">MintWise</span></a>
        <div class="nav-links"><a href="index.html" class="nav-link">Home</a><a href="about.html" class="nav-link">About</a><a href="contact.html" class="nav-link active">Contact</a></div>
        <div class="nav-actions"><button id="theme-toggle" class="icon-btn"><i class="fa-solid fa-moon"></i></button></div>
    </div></nav>

    <section class="section">
        <div class="container" style="max-width: 600px;">
            <h1 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 12px;">Contact Us</h1>
            <p style="color: var(--text-muted); margin-bottom: 36px;">Have a question, want to suggest a topic, or interested in writing for us? Drop us a message.</p>
            <form onsubmit="alert('Message sent. Thank you!'); return false;">
                <label style="font-weight: 700; display: block; margin-bottom: 6px;">Name</label>
                <input type="text" placeholder="Your name" required style="width:100%; padding:14px; border:1px solid var(--border); border-radius:10px; font-size:1rem; margin-bottom:20px; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;">
                <label style="font-weight: 700; display: block; margin-bottom: 6px;">Email</label>
                <input type="email" placeholder="you@email.com" required style="width:100%; padding:14px; border:1px solid var(--border); border-radius:10px; font-size:1rem; margin-bottom:20px; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;">
                <label style="font-weight: 700; display: block; margin-bottom: 6px;">Message</label>
                <textarea placeholder="Write your message..." required style="width:100%; padding:14px; border:1px solid var(--border); border-radius:10px; font-size:1rem; margin-bottom:24px; min-height:150px; resize:vertical; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;"></textarea>
                <button type="submit" class="btn-primary" style="width:100%; justify-content:center;">Send Message</button>
            </form>
        </div>
    </section>

    <footer class="footer"><div class="container footer-bottom"><p>&copy; 2026 MintWise.</p></div></footer>
    <script src="script.js"></script>
</body>
</html>
